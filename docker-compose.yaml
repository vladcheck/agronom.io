services:
  db:
    container_name: agrario_db
    image: postgis/postgis:17-master
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    container_name: agrario_backend
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - .env
      - ./apps/backend/.env
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres_data:
